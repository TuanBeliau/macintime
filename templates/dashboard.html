<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        body {
            font-family: "Inter", serif;
        }
    </style>
</head>

<body class="bg-zinc-800">
    <!-- Mobile menu button -->
    <button type="button" class="lg:hidden fixed top-4 left-4 z-50 text-white" onclick="toggleSidebar()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>
    
    <!-- Sidebar -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-zinc-700 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out z-40">
        <div class="flex flex-col h-full">
            <!-- Logo -->
            <div class="p-4">
                <img src="https://i.ibb.co.com/rKZMMngJ/Green-Mint-globalnet-technology-Logo-200-x-200-piksel.png" alt="logo" class="w-32 h-32 mx-auto">
            </div>
            
            <!-- Navigation -->
            <nav class="flex-1 px-4 space-y-2">
                <a href="{{ url_for('dashboard') }}" class="block px-4 py-2 rounded-md text-white hover:bg-amber-400 transition-colors">
                    Home
                </a>
                <a href="{{ url_for('settings') }}" class="block px-4 py-2 rounded-md text-white hover:bg-amber-400 transition-colors">
                    Settings
                </a>
            </nav>
            
            <!-- Logout button -->
            <div class="p-4">
                <a href="{{ url_for('logout') }}" class="block w-full px-4 py-2 text-center rounded-md text-white bg-red-600 hover:bg-red-700 transition-colors">
                    Logout
                </a>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="lg:ml-64 p-2 sm:p-4 min-h-screen flex items-center justify-center">
        <div class="bg-zinc-700 p-3 sm:p-6 rounded-lg shadow-lg w-xl max-w-4xl">
            <h2 class="text-xl sm:text-2xl font-medium text-center text-amber-400 mb-4">Dashboard</h2>

            <p class="text-center text-white text-sm sm:text-base">Berhasil masuk ke MikroTik dengan IP:</p>
            <p class="text-center font-semibold text-base sm:text-lg text-white mb-6">{{ host }}</p>

            <h3 class="text-base sm:text-lg text-white font-semibold mt-6 text-center">Daftar IP Address</h3>
            <div class="overflow-x-auto mt-4">
                <table class="w-full bg-white rounded-lg overflow-hidden">
                    <thead class="bg-amber-400">
                        <tr>
                            <th class="px-2 sm:px-4 py-2 text-left text-sm">Interface</th>
                            <th class="px-2 sm:px-4 py-2 text-left text-sm">IP Address</th>
                            <th class="px-2 sm:px-4 py-2 text-center text-sm">Status</th>
                            <th class="px-2 sm:px-4 py-2 text-center text-sm">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for ip in ip_list %}
                        <tr class="border-t">
                            <td class="px-2 sm:px-4 py-2 text-sm">{{ ip.interface }}</td>
                            <td class="px-2 sm:px-4 py-2 text-sm">{{ ip.address }}</td>
                            <td class="px-2 sm:px-4 py-2 text-sm">{{ ip.status }}</td> 
                            <td class="px-2 sm:px-4 py-2 text-sm text-center">
                                <form action="{{ url_for('delete_ip', id=ip.id) }}" method="POST">
                                    <button type="submit" class="{% if ip.status == 'dynamic' %} bg-gray-500 hover:bg-gray-700v {% else %} bg-red-500 hover:bg-red-600 {% endif %} text-white px-4 py-1 rounded-md text-sm transition-colors"
                                    {% if ip.status == "dynamic" %} disabled {% endif %}>
                                        Hapus
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }
    </script>
</body>

</html>
